name: Build And Upload Libre APK

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Prepare release signing (optional)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > keystore.jks
            printf "storeFile=keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n" \
              "$ANDROID_KEYSTORE_PASSWORD" \
              "$ANDROID_KEY_ALIAS" \
              "$ANDROID_KEY_PASSWORD" > keystore.properties
            echo "Release signing config prepared."
          else
            echo "Signing secrets not fully configured. Building unsigned release APK."
          fi

      - name: Build release APKs
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleLibreRelease

      - name: Rename APK
        run: |
          SOURCE_APK=$(ls app/build/outputs/apk/libre/release/*.apk | head -n 1)
          TAG_NAME="${GITHUB_REF_NAME}"
          TARGET_APK="KeePassDX-${TAG_NAME}-libre.apk"
          cp "$SOURCE_APK" "$TARGET_APK"
          echo "RENAMED_APK=$TARGET_APK" >> "$GITHUB_ENV"

      - name: Upload APK to GitHub Release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RENAMED_APK }}
          fail_on_unmatched_files: true

      - name: Upload APK artifact (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: keepassdx-libre-apk-${{ github.run_number }}
          path: ${{ env.RENAMED_APK }}
          if-no-files-found: error
          retention-days: 14
